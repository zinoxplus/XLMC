<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Hanzo · AI</title>
  <style>
    /* ----- تنظیمات کلی ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    body {
      background: #0a0c10;
      color: #e8edf5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      overflow: hidden;
      position: relative;
    }
    /* پس‌زمینه گرادیان متحرک */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 30% 20%, #1a2a3a, #0a0c10 75%);
      z-index: -2;
    }
    /* افکت نویز */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.03"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3"/></filter><rect width="200" height="200" filter="url(%23n)"/></svg>');
      background-size: 300px 300px;
      z-index: -1;
      pointer-events: none;
    }

    /* ----- کانتینر اصلی ----- */
    .container {
      max-width: 1100px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      position: relative;
    }

    /* ----- گوی شفاف (Holographic Orb) ----- */
    .orb-wrapper {
      position: relative;
      width: 200px;
      height: 200px;
      margin-bottom: -20px;
    }

    .orb {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(100, 200, 255, 0.25), rgba(0, 150, 255, 0.08) 60%, transparent 75%);
      box-shadow: 
        0 0 60px rgba(0, 180, 255, 0.15),
        inset 0 -30px 60px rgba(0, 100, 200, 0.1),
        inset 0 30px 60px rgba(100, 200, 255, 0.05);
      border: 1px solid rgba(100, 200, 255, 0.2);
      position: relative;
      animation: orbFloat 6s ease-in-out infinite;
      backdrop-filter: blur(4px);
      transform-style: preserve-3d;
    }

    /* انیمیشن شناور */
    @keyframes orbFloat {
      0% { transform: translateY(0) scale(1) rotate(0deg); }
      50% { transform: translateY(-12px) scale(1.02) rotate(3deg); }
      100% { transform: translateY(0) scale(1) rotate(0deg); }
    }

    /* حلقه‌های چرخان دور گوی */
    .orb-ring {
      position: absolute;
      border-radius: 50%;
      border: 1.5px solid rgba(100, 200, 255, 0.12);
      animation: ringSpin 20s linear infinite;
    }
    .orb-ring:nth-child(1) {
      inset: -18px;
      border-color: rgba(100, 200, 255, 0.08);
      animation-duration: 25s;
    }
    .orb-ring:nth-child(2) {
      inset: -32px;
      border-color: rgba(100, 200, 255, 0.05);
      animation-duration: 35s;
      animation-direction: reverse;
    }
    @keyframes ringSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* نقاط درخشان داخل گوی */
    .orb-sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #7ec8f0;
      box-shadow: 0 0 12px #7ec8f0;
      animation: sparkle 3s ease-in-out infinite;
    }
    .orb-sparkle:nth-child(3) { top: 20%; left: 25%; animation-delay: 0.2s; }
    .orb-sparkle:nth-child(4) { top: 60%; left: 70%; animation-delay: 1.2s; width: 6px; height: 6px; }
    .orb-sparkle:nth-child(5) { top: 35%; left: 80%; animation-delay: 2s; width: 3px; height: 3px; }
    .orb-sparkle:nth-child(6) { top: 75%; left: 20%; animation-delay: 0.8s; }
    @keyframes sparkle {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.4); }
    }

    /* ----- هدر و عنوان ----- */
    .header {
      text-align: center;
      margin-top: -8px;
    }
    .header h1 {
      font-size: 3.8rem;
      font-weight: 300;
      letter-spacing: 12px;
      background: linear-gradient(135deg, #7ec8f0, #4a9eff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px rgba(74, 158, 255, 0.15);
    }
    .header .sub {
      color: #8a9bb5;
      letter-spacing: 4px;
      font-size: 0.85rem;
      margin-top: -6px;
    }

    /* ----- بخش چت (پنل) ----- */
    .chat-panel {
      width: 100%;
      max-width: 800px;
      background: rgba(18, 24, 34, 0.65);
      backdrop-filter: blur(24px);
      border-radius: 28px;
      border: 1px solid rgba(100, 200, 255, 0.08);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.02);
      padding: 1.8rem 2rem;
      transition: 0.3s;
      min-height: 320px;
      display: flex;
      flex-direction: column;
    }

    .chat-messages {
      flex: 1;
      max-height: 300px;
      overflow-y: auto;
      padding-right: 6px;
      margin-bottom: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #4a9eff; border-radius: 10px; }

    .msg {
      padding: 10px 16px;
      border-radius: 18px;
      max-width: 85%;
      animation: msgFade 0.3s ease;
      font-size: 0.95rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: rgba(74, 158, 255, 0.18);
      border: 1px solid rgba(74, 158, 255, 0.12);
      border-bottom-right-radius: 4px;
    }
    .msg.ai {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-bottom-left-radius: 4px;
    }
    .msg.ai .typing-dots {
      display: inline-flex;
      gap: 4px;
      padding: 0 4px;
    }
    .msg.ai .typing-dots span {
      width: 6px;
      height: 6px;
      background: #8a9bb5;
      border-radius: 50%;
      animation: dotBounce 1.2s infinite;
    }
    .msg.ai .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .msg.ai .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }
    @keyframes msgFade {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ----- ورودی و دکمه ----- */
    .input-row {
      display: flex;
      gap: 12px;
      align-items: center;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      padding-top: 1rem;
    }
    .input-row input {
      flex: 1;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 12px 18px;
      border-radius: 40px;
      color: #e8edf5;
      font-size: 0.95rem;
      outline: none;
      transition: 0.2s;
    }
    .input-row input:focus {
      border-color: rgba(74, 158, 255, 0.3);
      box-shadow: 0 0 20px rgba(74, 158, 255, 0.04);
    }
    .input-row input::placeholder {
      color: #5a6a7e;
      font-weight: 300;
    }
    .input-row button {
      background: linear-gradient(135deg, #4a9eff, #2b7be0);
      border: none;
      padding: 12px 28px;
      border-radius: 40px;
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 16px rgba(74, 158, 255, 0.15);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .input-row button:hover {
      transform: scale(1.02);
      box-shadow: 0 6px 28px rgba(74, 158, 255, 0.25);
      background: linear-gradient(135deg, #5aafff, #3b8bf0);
    }
    .input-row button:active { transform: scale(0.96); }
    .input-row button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ----- وضعیت اتصال ----- */
    .status {
      font-size: 0.7rem;
      color: #5a6a7e;
      letter-spacing: 1px;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }
    .status .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4a9eff;
      animation: pulseDot 2s infinite;
    }
    .status .dot.off { background: #5a6a7e; animation: none; }
    @keyframes pulseDot {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* ----- واکنش‌گرا ----- */
    @media (max-width: 640px) {
      .orb-wrapper { width: 140px; height: 140px; }
      .header h1 { font-size: 2.6rem; letter-spacing: 6px; }
      .chat-panel { padding: 1.2rem; }
      .input-row { flex-wrap: wrap; }
      .input-row input { flex: 1 1 100%; }
      .input-row button { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- گوی + حلقه‌ها -->
    <div class="orb-wrapper">
      <div class="orb">
        <div class="orb-ring"></div>
        <div class="orb-ring"></div>
        <div class="orb-sparkle"></div>
        <div class="orb-sparkle"></div>
        <div class="orb-sparkle"></div>
        <div class="orb-sparkle"></div>
      </div>
    </div>

    <!-- عنوان -->
    <div class="header">
      <h1>HANZO</h1>
      <div class="sub">◈  هوش مصنوعی  ◈</div>
    </div>

    <!-- پنل چت -->
    <div class="chat-panel">
      <div class="chat-messages" id="chatMessages">
        <div class="msg ai">👋 سلام! من هانزو هستم. هر سوالی داری، بپرس.</div>
      </div>

      <div class="input-row">
        <input type="text" id="userInput" placeholder="پیام خود را بنویسید..." />
        <button id="sendBtn">▶ ارسال</button>
      </div>

      <div class="status">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">متصل به DeepSeek</span>
      </div>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // ---------- تنظیمات API ----------
      // ⚠️ کلید API را در یک فایل .env یا سرور خود نگه دارید.
      // اینجا فقط برای نمایش قرار داده شده است.
      const API_KEY = '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'; // کلید شما
      const API_URL = 'https://api.deepseek.com/v1/chat/completions';

      // ---------- المان‌های DOM ----------
      const chatMessages = document.getElementById('chatMessages');
      const userInput = document.getElementById('userInput');
      const sendBtn = document.getElementById('sendBtn');
      const statusDot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');

      // ---------- وضعیت ----------
      let isWaiting = false;
      let conversationHistory = [
        { role: 'system', content: 'تو هانزو هستی، یک هوش مصنوعی دوستانه، خلاق و باهوش. به فارسی پاسخ بده و با لحنی گرم و صمیمی صحبت کن.' }
      ];

      // ---------- توابع کمکی ----------
      function updateStatus(connected) {
        if (connected) {
          statusDot.className = 'dot';
          statusText.textContent = 'متصل به DeepSeek';
        } else {
          statusDot.className = 'dot off';
          statusText.textContent = 'قطع ارتباط';
        }
      }

      // اضافه کردن پیام به چت
      function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.textContent = text;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return div;
      }

      // نمایش نشانگر تایپ
      function showTyping() {
        const div = document.createElement('div');
        div.className = 'msg ai';
        div.id = 'typingIndicator';
        div.innerHTML = `<span class="typing-dots"><span></span><span></span><span></span></span>`;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }
      function removeTyping() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
      }

      // ---------- فراخوانی API ----------
      async function callDeepSeek(userMessage) {
        // افزودن پیام کاربر به تاریخچه
        conversationHistory.push({ role: 'user', content: userMessage });

        // نمایش پیام کاربر
        addMessage(userMessage, 'user');

        // نمایش تایپ
        showTyping();
        isWaiting = true;
        sendBtn.disabled = true;
        userInput.disabled = true;
        updateStatus(true);

        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${API_KEY}`
            },
            body: JSON.stringify({
              model: 'deepseek-chat',
              messages: conversationHistory,
              temperature: 0.7,
              max_tokens: 800,
              stream: false
            })
          });

          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            throw new Error(errData.error?.message || `خطا ${response.status}`);
          }

          const data = await response.json();
          const reply = data.choices?.[0]?.message?.content || 'متأسفم، پاسخی دریافت نشد.';

          // ذخیره پاسخ در تاریخچه
          conversationHistory.push({ role: 'assistant', content: reply });

          // حذف تایپ و نمایش پاسخ
          removeTyping();
          addMessage(reply, 'ai');

          updateStatus(true);

        } catch (error) {
          removeTyping();
          addMessage(`⚠️ خطا: ${error.message || 'مشکلی در ارتباط با سرور پیش آمد.'}`, 'ai');
          updateStatus(false);
          console.error('API Error:', error);
        } finally {
          isWaiting = false;
          sendBtn.disabled = false;
          userInput.disabled = false;
          userInput.focus();
        }
      }

      // ---------- رویدادها ----------
      function handleSend() {
        const text = userInput.value.trim();
        if (!text || isWaiting) return;
        userInput.value = '';
        callDeepSeek(text);
      }

      sendBtn.addEventListener('click', handleSend);
      userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      });

      // ---------- شروع (بررسی اولیه) ----------
      // تست اتصال با یک درخواست سبک
      async function testConnection() {
        try {
          const testResp = await fetch(API_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${API_KEY}`
            },
            body: JSON.stringify({
              model: 'deepseek-chat',
              messages: [{ role: 'user', content: 'پینگ' }],
              max_tokens: 1
            })
          });
          if (testResp.ok) {
            updateStatus(true);
          } else {
            updateStatus(false);
          }
        } catch {
          updateStatus(false);
        }
      }
      testConnection();

      // فوکوس اولیه
      userInput.focus();
    })();
  </script>
</body>
</html>
